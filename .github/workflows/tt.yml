name: manual pipeline

on:
  workflow_dispatch:

jobs:
  job_1:
    name: Premier Job
    runs-on: ubuntu-latest
    steps:
      - run: echo "hello world ${{ github.job }}"

  job_2:
    name: Deuxième Job (Parallèle)
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - run: echo "hello world ${{ github.job }}"

  job_3:
    name: Troisième Job (Parallèle)
    runs-on: ubuntu-latest
    needs: job_1
    steps:
      - run: echo "hello world ${{ github.job }}"